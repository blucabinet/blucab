{% extends "main/base.html" %}
{% load i18n %}

{% block title %}
{% trans "Login Here" %}
{% endblock %}

{% load crispy_forms_tags %}

{% block content %}
    <form method="post" class="form-group">
        {% csrf_token %}
        {{ form|crispy }}
        <p>{% trans "Don't have an account?" %} {% trans "Create one" %} <a href="/register">{% trans "here" %}</a>.</p>
        <button type="submit" class="btn btn-success">{% trans "Login" %}</button>
    </form>
{% endblock %}
